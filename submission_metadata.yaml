methodology_summary: |
  We built an offline, deterministic three-stage pipeline. Stage 1 streams all 100K
  candidates through a 6-term weighted base scorer combining JD skill overlap,
  skill-group overlap, term overlap, experience-band fit, core execution signals, and
  a career evidence term (AI infrastructure hits in career history text only, capped
  at 5). Candidates who explicitly disclaim production ownership receive a 0.5x
  penalty on the career evidence term, grounded in the JD disqualifier clause.
  Evidence calibration applies a bounded ±0.10 adjustment. A top-300 min-heap is
  maintained. Stage 2 applies a headroom-scaled evidence depth bonus, a small
  behavioral bonus, a surface-match penalty, and a trap penalty over the pool; top
  100 selected by reranked score. Stage 3 generates deterministic natural-prose
  reasoning from candidate facts and JD-aligned career evidence — no hosted LLM.
  CPU-only, no network, ~105s on Apple M4 16GB.
